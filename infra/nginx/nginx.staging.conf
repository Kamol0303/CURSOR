worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    # Docker embedded DNS — avoids stale backend IP after container restart (502)
    resolver 127.0.0.11 valid=10s ipv6=off;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=verify_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

    # HTTP → HTTPS only (no static fallback)
    server {
        listen 80;
        server_name tamor.staging.local localhost;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name tamor.staging.local localhost;

        ssl_certificate /etc/nginx/tls/fullchain.pem;
        ssl_certificate_key /etc/nginx/tls/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        client_max_body_size 10m;

        location /health {
            set $upstream_backend backend:8000;
            proxy_pass http://$upstream_backend;
            include /etc/nginx/proxy_params.conf;
        }

        location /api/v1/auth/ {
            limit_req zone=login_limit burst=10 nodelay;
            set $upstream_backend backend:8000;
            proxy_pass http://$upstream_backend;
            include /etc/nginx/proxy_params.conf;
        }

        location /api/v1/public/verify/ {
            limit_req zone=verify_limit burst=3 nodelay;
            set $upstream_backend backend:8000;
            proxy_pass http://$upstream_backend;
            include /etc/nginx/proxy_params.conf;
        }

        location /api/ {
            limit_req zone=api_limit burst=60 nodelay;
            set $upstream_backend backend:8000;
            proxy_pass http://$upstream_backend;
            include /etc/nginx/proxy_params.conf;
        }

        location /analytics/ {
            limit_req zone=api_limit burst=20 nodelay;
            set $upstream_ai ai-analytics:8001;
            proxy_pass http://$upstream_ai;
            include /etc/nginx/proxy_params.conf;
        }

        location / {
            set $upstream_frontend frontend:3000;
            proxy_pass http://$upstream_frontend;
            include /etc/nginx/proxy_params.conf;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
