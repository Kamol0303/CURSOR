# Production Docker Compose — staging / on-prem deployment
# Usage:
#   cp .env.production.example .env.production  # fill secrets
#   ./infra/nginx/generate-dev-certs.sh          # staging TLS only
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tamor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-tamor}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-analytics-role.sql:/docker-entrypoint-initdb.d/02-analytics-role.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tamor}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env.production
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
    volumes:
      - jwt_secrets:/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4"
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://${PUBLIC_HOST:-tamor.local}
    depends_on:
      - backend
    networks:
      - internal

  ai-analytics:
    build: ./ai-analytics-service
    restart: unless-stopped
    env_file: .env.production
    environment:
      ENVIRONMENT: production
    volumes:
      - jwt_secrets:/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  celery-worker:
    build: ./backend
    restart: unless-stopped
    env_file: .env.production
    environment:
      ENVIRONMENT: production
    volumes:
      - jwt_secrets:/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=warning --concurrency=2
    networks:
      - internal

  celery-beat:
    build: ./backend
    restart: unless-stopped
    env_file: .env.production
    depends_on:
      - redis
      - celery-worker
    command: celery -A app.tasks.celery_app beat --loglevel=warning
    networks:
      - internal

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/proxy_params.conf:/etc/nginx/proxy_params.conf:ro
      - ./infra/nginx/tls:/etc/nginx/tls:ro
    depends_on:
      - backend
      - frontend
      - ai-analytics
    networks:
      - internal
      - edge

networks:
  edge:
  internal:
    internal: true

volumes:
  postgres_data:
  redis_data:
  jwt_secrets:
