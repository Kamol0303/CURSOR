version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: tamor
      POSTGRES_USER: tamor
      POSTGRES_PASSWORD: tamor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      TAMOR_ENVIRONMENT: development
      TAMOR_DATABASE_URL: postgresql+asyncpg://tamor:tamor@postgres:5432/tamor
      TAMOR_SYNC_DATABASE_URL: postgresql+psycopg://tamor:tamor@postgres:5432/tamor
      TAMOR_REDIS_URL: redis://redis:6379/0
      TAMOR_ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  minio_data:
