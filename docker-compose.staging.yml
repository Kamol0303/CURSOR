# Staging environment — production-like with file-based secrets
# Usage:
#   ./infra/nginx/generate-dev-certs.sh
#   cp .env.production.example .env.staging  # set ENVIRONMENT=staging, SECRETS_BACKEND=file
#   docker compose -f docker-compose.staging.yml --env-file .env.staging up -d

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tamor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:-tamor}
    volumes:
      - postgres_staging:/var/lib/postgresql/data
      - ./infra/postgres/init-analytics-role.sql:/docker-entrypoint-initdb.d/02-analytics-role.sql
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [internal]

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env.staging
    environment:
      ENVIRONMENT: staging
      DEBUG: "false"
      SECRETS_BACKEND: file
    volumes:
      - jwt_secrets:/secrets
    depends_on: [postgres, redis]
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    networks: [internal]

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://${PUBLIC_HOST:-tamor.staging.local}
    depends_on: [backend]
    networks: [internal]

  ai-analytics:
    build: ./ai-analytics-service
    restart: unless-stopped
    env_file: .env.staging
    environment:
      ENVIRONMENT: staging
    volumes:
      - jwt_secrets:/secrets:ro
    depends_on: [postgres, backend]
    networks: [internal]

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/proxy_params.conf:/etc/nginx/proxy_params.conf:ro
      - ./infra/nginx/tls:/etc/nginx/tls:ro
    depends_on: [backend, frontend]
    networks: [internal, edge]

networks:
  edge:
  internal:
    internal: true

volumes:
  postgres_staging:
  jwt_secrets:
