worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=verify_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:3000;
    }

    upstream ai_analytics {
        server ai-analytics:8001;
    }

    # Staging: HTTP works out of the box (WSL / local hosts)
    server {
        listen 80;
        server_name tamor.staging.local localhost _;

        client_max_body_size 10m;

        location /health {
            proxy_pass http://backend;
            include /etc/nginx/proxy_params.conf;
        }

        location /api/v1/auth/login {
            limit_req zone=login_limit burst=5 nodelay;
            proxy_pass http://backend;
            include /etc/nginx/proxy_params.conf;
        }

        location /api/v1/auth/parent/ {
            limit_req zone=login_limit burst=5 nodelay;
            proxy_pass http://backend;
            include /etc/nginx/proxy_params.conf;
        }

        location /api/v1/public/verify/ {
            limit_req zone=verify_limit burst=3 nodelay;
            proxy_pass http://backend;
            include /etc/nginx/proxy_params.conf;
        }

        location /api/ {
            limit_req zone=api_limit burst=60 nodelay;
            proxy_pass http://backend;
            include /etc/nginx/proxy_params.conf;
        }

        location /analytics/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://ai_analytics;
            include /etc/nginx/proxy_params.conf;
        }

        location / {
            proxy_pass http://frontend;
            include /etc/nginx/proxy_params.conf;
        }
    }

    # Optional HTTPS when certs exist (auto-generated on first start)
    server {
        listen 443 ssl http2;
        server_name tamor.staging.local localhost _;

        ssl_certificate /etc/nginx/tls/fullchain.pem;
        ssl_certificate_key /etc/nginx/tls/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        client_max_body_size 10m;

        location /health {
            proxy_pass http://backend;
            include /etc/nginx/proxy_params.conf;
        }

        location /api/ {
            limit_req zone=api_limit burst=60 nodelay;
            proxy_pass http://backend;
            include /etc/nginx/proxy_params.conf;
        }

        location /analytics/ {
            proxy_pass http://ai_analytics;
            include /etc/nginx/proxy_params.conf;
        }

        location / {
            proxy_pass http://frontend;
            include /etc/nginx/proxy_params.conf;
        }
    }
}
