# Production Docker Compose — on-prem / Uzbekistan infrastructure
# Usage:
#   cp .env.production.example .env.production  # fill secrets
#   Install CA-signed certs to infra/nginx/tls/
#   ./scripts/go-live.sh

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tamor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-tamor}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-analytics-role.sql:/docker-entrypoint-initdb.d/02-analytics-role.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tamor} -d ${POSTGRES_DB:-tamor}"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ""
        HTTPS_PROXY: ""
        http_proxy: ""
        https_proxy: ""
    restart: unless-stopped
    env_file: .env.production
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      SECRETS_BACKEND: vault
      FILE_UPLOAD_DIR: /data/uploads
    volumes:
      - jwt_secrets:/secrets
      - upload_data:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["sh", "./scripts/production_bootstrap.sh"]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: https://${PUBLIC_HOST:-tamor.toyloq.uz}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://${PUBLIC_HOST:-tamor.toyloq.uz}
      INTERNAL_API_URL: http://backend:8000
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal

  ai-analytics:
    build:
      context: ./ai-analytics-service
      args:
        HTTP_PROXY: ""
        HTTPS_PROXY: ""
    restart: unless-stopped
    env_file: .env.production
    environment:
      ENVIRONMENT: production
    volumes:
      - jwt_secrets:/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ""
        HTTPS_PROXY: ""
    restart: unless-stopped
    env_file: .env.production
    environment:
      ENVIRONMENT: production
      FILE_UPLOAD_DIR: /data/uploads
    volumes:
      - jwt_secrets:/secrets:ro
      - upload_data:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=warning --concurrency=2
    networks:
      - internal

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env.production
    depends_on:
      - redis
      - celery-worker
    command: celery -A app.tasks.celery_app beat --loglevel=warning
    networks:
      - internal

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/proxy_params.conf:/etc/nginx/proxy_params.conf:ro
      - ./infra/nginx/tls:/etc/nginx/tls:ro
    depends_on:
      - backend
      - frontend
      - ai-analytics
    networks:
      - internal
      - edge

networks:
  edge:
  internal:
    internal: true

volumes:
  postgres_data:
  redis_data:
  jwt_secrets:
  upload_data:
