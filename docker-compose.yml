services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: tamor
      POSTGRES_PASSWORD: tamor_dev
      POSTGRES_DB: tamor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-analytics-role.sql:/docker-entrypoint-initdb.d/02-analytics-role.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tamor"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      DEBUG: "true"
      DATABASE_URL: postgresql+asyncpg://tamor:tamor_dev@postgres:5432/tamor
      REDIS_URL: redis://redis:6379/0
      JWT_PRIVATE_KEY_PATH: /secrets/jwt_private.pem
      JWT_PUBLIC_KEY_PATH: /secrets/jwt_public.pem
      TOTP_ENCRYPTION_KEY: dev-only-change-in-production-32bytes!!
      PINFL_ENCRYPTION_KEY: dev-pinfl-key-change-in-prod!!
      CORS_ORIGINS: '["http://localhost:3000"]'
      AI_ANALYTICS_URL: http://ai-analytics:8001
      SMS_WEBHOOK_SECRET: dev-sms-webhook-secret
    volumes:
      - jwt_secrets:/secrets
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  ai-analytics:
    build: ./ai-analytics-service
    ports:
      - "8001:8001"
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://tamor_analytics:tamor_dev@postgres:5432/tamor
      JWT_PUBLIC_KEY_PATH: /secrets/jwt_public.pem
    volumes:
      - jwt_secrets:/secrets
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started

volumes:
  postgres_data:
  jwt_secrets:
