# Staging environment — production-like with file-based secrets
# Usage:
#   ./infra/nginx/generate-dev-certs.sh
#   cp .env.production.example .env.staging  # set ENVIRONMENT=staging, SECRETS_BACKEND=file
#   docker compose -f docker-compose.staging.yml --env-file .env.staging up -d

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tamor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:-tamor}
    volumes:
      - postgres_staging:/var/lib/postgresql/data
      - ./infra/postgres/init-analytics-role.sql:/docker-entrypoint-initdb.d/02-analytics-role.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tamor} -d ${POSTGRES_DB:-tamor}"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [internal]

  backend:
    build:
      context: ./backend
      args:
        HTTP_PROXY: ""
        HTTPS_PROXY: ""
        http_proxy: ""
        https_proxy: ""
    restart: unless-stopped
    env_file: .env.staging
    environment:
      ENVIRONMENT: staging
      DEBUG: "false"
      SECRETS_BACKEND: file
      FILE_UPLOAD_DIR: /data/uploads
    volumes:
      - jwt_secrets:/secrets
      - upload_staging:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["sh", "./scripts/staging_bootstrap.sh"]
    networks: [internal]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://${PUBLIC_HOST:-tamor.staging.local}
      INTERNAL_API_URL: http://backend:8000
    depends_on: [backend]
    networks: [internal]

  ai-analytics:
    build: ./ai-analytics-service
    restart: unless-stopped
    env_file: .env.staging
    environment:
      ENVIRONMENT: staging
    volumes:
      - jwt_secrets:/secrets:ro
    depends_on: [postgres, backend]
    networks: [internal]

  nginx:
    build:
      context: ./infra/nginx
      dockerfile: Dockerfile
      args:
        NGINX_CONFIG: nginx.staging.conf
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/tls:/etc/nginx/tls:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks: [internal, edge]

networks:
  edge:
  internal:
    internal: true

volumes:
  postgres_staging:
  jwt_secrets:
  upload_staging:
