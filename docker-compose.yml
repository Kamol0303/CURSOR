services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: tamor
      POSTGRES_PASSWORD: tamor_dev_password
      POSTGRES_DB: tamor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tamor"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: tamor_minio
      MINIO_ROOT_PASSWORD: tamor_minio_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      DEBUG: "true"
      DATABASE_URL: postgresql+asyncpg://tamor:tamor_dev_password@postgres:5432/tamor
      DATABASE_URL_SYNC: postgresql://tamor:tamor_dev_password@postgres:5432/tamor
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      SMS_PROVIDER: console
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             python -m scripts.seed_demo_users &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  ai-analytics:
    build: ./ai-analytics-service
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://tamor:tamor_dev_password@postgres:5432/tamor
      JWT_PUBLIC_KEY_PATH: /app/keys/jwt_public.pem
    volumes:
      - ./backend/keys:/app/keys:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
